spring.application.name=matricula-service
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/escola_db?charSet=UTF-8
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8082

cadastro-service.url=${CADASTRO_SERVICE_URL:http://cadastro-service:8081}
disciplina-service.url=${DISCIPLINA_SERVICE_URL:http://disciplina-service:8083}

# Actuator - Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# Info do servico
info.app.name=matricula-service
info.app.description=Servico de gerenciamento de matriculas
info.app.version=1.0.0

# ==========================================
# Resilience4j - Circuit Breaker
# ==========================================
# Circuit breaker para cadastro-service (verificacao de alunos)
resilience4j.circuitbreaker.instances.cadastroService.register-health-indicator=true
resilience4j.circuitbreaker.instances.cadastroService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.cadastroService.sliding-window-size=10
resilience4j.circuitbreaker.instances.cadastroService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cadastroService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.cadastroService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.cadastroService.automatic-transition-from-open-to-half-open-enabled=true

# Circuit breaker para disciplina-service (verificacao de disciplinas)
resilience4j.circuitbreaker.instances.disciplinaService.register-health-indicator=true
resilience4j.circuitbreaker.instances.disciplinaService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.disciplinaService.sliding-window-size=10
resilience4j.circuitbreaker.instances.disciplinaService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.disciplinaService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.disciplinaService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.disciplinaService.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j - Retry
resilience4j.retry.instances.cadastroService.max-attempts=3
resilience4j.retry.instances.cadastroService.wait-duration=1s
resilience4j.retry.instances.cadastroService.enable-exponential-backoff=true
resilience4j.retry.instances.cadastroService.exponential-backoff-multiplier=2

resilience4j.retry.instances.disciplinaService.max-attempts=3
resilience4j.retry.instances.disciplinaService.wait-duration=1s
resilience4j.retry.instances.disciplinaService.enable-exponential-backoff=true
resilience4j.retry.instances.disciplinaService.exponential-backoff-multiplier=2

# Resilience4j - TimeLimiter
resilience4j.timelimiter.instances.cadastroService.timeout-duration=5s
resilience4j.timelimiter.instances.disciplinaService.timeout-duration=5s

# Expor metricas do Resilience4j no Actuator
management.health.circuitbreakers.enabled=true
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
