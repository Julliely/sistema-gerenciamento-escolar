spring.application.name=cadastro-service
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/escola_db?charSet=UTF-8
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8081

# Actuator - Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# Info do servico
info.app.name=cadastro-service
info.app.description=Servico de cadastro de alunos e professores
info.app.version=1.0.0