<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Professor</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="professores.css">
</head>
<body>
    <header>
        <a href="../../index.html" class="btn-voltar">← Voltar</a>
        <h1>Cadastrar Professor</h1>
    </header>

    <main class="form-container">
        <form id="formProfessor">
            <h2>Cadastrar Professor</h2>
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Nome completo" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="email@exemplo.com" required>
            </div>
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="XXX.XXX.XXX-XX" required>
            </div>
            <div class="form-group">
                <label for="especialidade">Especialidade</label>
                <input type="text" id="especialidade" placeholder="Ex: Matemática" required>
            </div>
            <button type="submit" class="btn-submit">Cadastrar</button>
        </form>
    </main>

    <!-- Pop-up de sucesso -->
    <div id="popup" class="popup hidden">
        <div class="popup-box">
            <span class="popup-icon">✓</span>
            <p>Professor cadastrado com sucesso!</p>
        </div>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/cpf-validator.js"></script>
    <script src="../../js/services/professor.service.js"></script>
    <script>
        document.getElementById('formProfessor').addEventListener('submit', async (e) => {
            e.preventDefault();

            const professor = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value,
                especialidade: document.getElementById('especialidade').value
            };

            try {
                await ProfessorService.cadastrar(professor);
                document.getElementById('popup').classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'listar.html';
                }, 1500);
            } catch (error) {
                alert('Erro ao cadastrar professor. Tente novamente.');
                console.error('Erro:', error);
            }
        });
    </script>
</body>
</html>
