<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professores</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="professores.css">
</head>
<body>
    <header>
        <a href="../../index.html" class="btn-voltar">← Voltar</a>
        <h1>Professores</h1>
    </header>

<main class="list-container">

    <div style="text-align:center; margin-bottom:20px;">
        <h2>Lista de Professores</h2>
    </div>

    <div class="search-container">
        <input type="text" id="pesquisa" placeholder="Pesquisar por nome ou especialidade..." oninput="filtrar()">
    </div>

    <div>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Especialidade</th>
                    <th>CPF</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>

    <div style="margin-top:20px; text-align:center;">
        <a href="cadastrar.html">
            <button class="btn-novo">+ Novo Professor</button>
        </a>
    </div>

</main>

    <!-- Pop-up de edição -->
    <div id="popup-editar" class="popup hidden">
        <div class="popup-box">
            <h3>Editar Professor</h3>
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="edit-nome">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="edit-email">
            </div>
            <div class="form-group">
                <label>CPF</label>
                <input type="text" id="edit-cpf">
            </div>
            <div class="form-group">
                <label>Especialidade</label>
                <input type="text" id="edit-especialidade">
            </div>
            <div class="popup-actions">
                <button class="btn-cancelar" onclick="fecharEditar()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarEdicao()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Pop-up de confirmação de exclusão -->
    <div id="popup-excluir" class="popup hidden">
        <div class="popup-box">
            <span class="popup-icon">⚠</span>
            <p>Deseja excluir este professor?</p>
            <div class="popup-actions">
                <button class="btn-cancelar" onclick="fecharExcluir()">Cancelar</button>
                <button class="btn-excluir" onclick="confirmarExclusao()">Excluir</button>
            </div>
        </div>
    </div>

    <!-- Pop-up de sucesso -->
    <div id="popup-sucesso" class="popup hidden">
        <div class="popup-box">
            <span class="popup-icon">✓</span>
            <p id="msg-sucesso"></p>
        </div>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/services/professor.service.js"></script>
    <script>
        let todosOsProfessores = [];
        let idParaExcluir = null;

        async function carregarProfessores() {
            todosOsProfessores = await ProfessorService.listar();
            renderizar(todosOsProfessores);
        }

        function renderizar(professores) {
            const tabela = document.getElementById('tabela');
            tabela.innerHTML = '';
            professores.forEach(p => {
                tabela.innerHTML += `
                    <tr>
                        <td>${p.nome}</td>
                        <td>${p.especialidade}</td>
                        <td>${p.cpf}</td>
                        <td class="acoes">
                            <button class="btn-editar" onclick="abrirEditar(${p.id}, '${p.nome}', '${p.email}', '${p.cpf}', '${p.especialidade}')">Editar</button>
                            <button class="btn-excluir" onclick="abrirExcluir(${p.id})">Excluir</button>
                        </td>
                    </tr>`;
            });
        }

        function filtrar() {
            const termo = document.getElementById('pesquisa').value.toLowerCase();
            const filtrados = todosOsProfessores.filter(p =>
                p.nome.toLowerCase().includes(termo) ||
                p.especialidade.toLowerCase().includes(termo)
            );
            renderizar(filtrados);
        }

        function abrirEditar(id, nome, email, cpf, especialidade) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-nome').value = nome;
            document.getElementById('edit-email').value = email;
            document.getElementById('edit-cpf').value = cpf;
            document.getElementById('edit-especialidade').value = especialidade;
            document.getElementById('popup-editar').classList.remove('hidden');
        }

        function fecharEditar() {
            document.getElementById('popup-editar').classList.add('hidden');
        }

        async function salvarEdicao() {
            const id = document.getElementById('edit-id').value;
            const professor = {
                nome: document.getElementById('edit-nome').value,
                email: document.getElementById('edit-email').value,
                cpf: document.getElementById('edit-cpf').value,
                especialidade: document.getElementById('edit-especialidade').value
            };
            await ProfessorService.atualizar(id, professor);
            fecharEditar();
            mostrarSucesso('Professor atualizado com sucesso!');
            carregarProfessores();
        }

        function abrirExcluir(id) {
            idParaExcluir = id;
            document.getElementById('popup-excluir').classList.remove('hidden');
        }

        function fecharExcluir() {
            document.getElementById('popup-excluir').classList.add('hidden');
        }

        async function confirmarExclusao() {
            await ProfessorService.deletar(idParaExcluir);
            fecharExcluir();
            mostrarSucesso('Professor excluído com sucesso!');
            carregarProfessores();
        }

        function mostrarSucesso(msg) {
            document.getElementById('msg-sucesso').textContent = msg;
            document.getElementById('popup-sucesso').classList.remove('hidden');
            setTimeout(() => document.getElementById('popup-sucesso').classList.add('hidden'), 1500);
        }

        carregarProfessores();
    </script>
</body>
</html>
