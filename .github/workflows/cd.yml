##############################################
# CD Pipeline - Build de Imagens Docker e Push para GHCR
#
# Executado em: push de tags (v*) ou manual
# O que faz:
#   1. Builda imagem Docker de cada servico em paralelo
#   2. Faz push para GitHub Container Registry (ghcr.io)
#   3. Tageia com versao semantica e SHA do commit
#
# Como usar:
#   git tag v1.0.0 && git push origin v1.0.0
#   Ou: rodar manualmente via GitHub Actions UI
##############################################
name: CD - Build & Push Docker Images

on:
  push:
    tags:
      - 'v*'  # Dispara quando criar tag como v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # Permite rodar manualmente pelo GitHub

# Permissoes para push no GHCR
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ==========================================
  # Build e Push das imagens Docker
  # ==========================================
  build-and-push:
    name: Docker ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - cadastro-service
          - disciplina-service
          - matricula-service
          - gateway-service
          - frontend

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/escola-${{ matrix.service }}
          tags: |
            # Tag semantica (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Tag major.minor (v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Tag "latest" para a branch main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag com SHA curto do commit
            type=sha,prefix=,format=short

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Imagem publicada
        run: |
          echo "============================================"
          echo " Imagem publicada: ${{ matrix.service }}"
          echo "============================================"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "============================================"

  # ==========================================
  # Resumo do deploy
  # ==========================================
  cd-summary:
    name: CD Summary
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always()
    steps:
      - name: Resultado
        run: |
          echo "============================================"
          echo " CD Pipeline - Resultado"
          echo "============================================"
          echo "Build & Push: ${{ needs.build-and-push.result }}"
          echo ""
          echo "Imagens disponiveis em:"
          echo "  ghcr.io/${{ github.repository_owner }}/escola-cadastro-service"
          echo "  ghcr.io/${{ github.repository_owner }}/escola-disciplina-service"
          echo "  ghcr.io/${{ github.repository_owner }}/escola-matricula-service"
          echo "  ghcr.io/${{ github.repository_owner }}/escola-gateway-service"
          echo "  ghcr.io/${{ github.repository_owner }}/escola-frontend"
          echo ""
          echo "Para atualizar o K8s, altere as tags nos Deployments:"
          echo "  image: ghcr.io/${{ github.repository_owner }}/escola-cadastro-service:latest"
          echo "============================================"
