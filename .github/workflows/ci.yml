##############################################
# CI Pipeline - Build e Test dos Microsservicos
#
# Executado em: push para main, pull requests
# O que faz:
#   1. Builda e testa cada microsservico Java em paralelo
#   2. Valida os manifests Kubernetes
#   3. Relata status de cada servico independentemente
##############################################
name: CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==========================================
  # Build e Test dos microsservicos Java
  # Cada servico roda em paralelo (matrix strategy)
  # ==========================================
  build-and-test:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Nao cancela os outros se um falhar
      matrix:
        service:
          - cadastro-service
          - disciplina-service
          - matricula-service
          - gateway-service
        include:
          - service: cadastro-service
            port: 8081
          - service: disciplina-service
            port: 8083
          - service: matricula-service
            port: 8082
          - service: gateway-service
            port: 8080

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache do Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ matrix.service }}-${{ hashFiles(format('{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ matrix.service }}-
            ${{ runner.os }}-maven-

      - name: Build e Test com Maven
        working-directory: ${{ matrix.service }}
        run: mvn -B clean verify

      - name: Upload do JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 5

  # ==========================================
  # Validacao dos manifests Kubernetes
  # ==========================================
  validate-k8s:
    name: Validar Manifests K8s
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validar manifests do namespace escola-system
        run: |
          echo "Validando manifests K8s..."
          kubeconform -summary -strict \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            k8s/*.yaml

      - name: Validar manifests do monitoring
        run: |
          echo "Validando manifests de monitoring..."
          kubeconform -summary -strict \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            k8s/monitoring/*.yaml

  # ==========================================
  # Resumo final do CI
  # ==========================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, validate-k8s]
    if: always()
    steps:
      - name: Verificar resultados
        run: |
          echo "============================================"
          echo " CI Pipeline - Resultado"
          echo "============================================"
          echo "Build & Test: ${{ needs.build-and-test.result }}"
          echo "K8s Validate: ${{ needs.validate-k8s.result }}"
          echo "============================================"
          if [ "${{ needs.build-and-test.result }}" = "failure" ] || [ "${{ needs.validate-k8s.result }}" = "failure" ]; then
            echo "CI FALHOU!"
            exit 1
          fi
          echo "CI passou com sucesso!"
