services:
  postgres:
    image: postgres:15-alpine
    container_name: escola_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: escola_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cadastro-service:
    build:
      context: ./cadastro-service
    container_name: cadastro-service
    ports:
      - "8081:8081"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    depends_on:
      - postgres

  matricula-service:
    build:
      context: ./matricula-service
    container_name: matricula-service
    ports:
      - "8082:8082"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      CADASTRO_SERVICE_URL: http://cadastro-service:8081
      DISCIPLINA_SERVICE_URL: http://disciplina-service:8083
    depends_on:
      - postgres
      - cadastro-service
      - disciplina-service

  disciplina-service:
    build:
      context: ./disciplina-service
    container_name: disciplina-service
    ports:
      - "8083:8083"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      CADASTRO_SERVICE_URL: http://cadastro-service:8081
    depends_on:
      - postgres
      - cadastro-service

  gateway-service:
    build:
      context: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      CADASTRO_SERVICE_URL: http://cadastro-service:8081
      MATRICULA_SERVICE_URL: http://matricula-service:8082
      DISCIPLINA_SERVICE_URL: http://disciplina-service:8083
    depends_on:
      - cadastro-service
      - matricula-service
      - disciplina-service

  frontend:
    build:
      context: ./frontend
    container_name: escola-frontend
    ports:
      - "5500:80"
    depends_on:
      - gateway-service

volumes:
  postgres-data:
    driver: local
