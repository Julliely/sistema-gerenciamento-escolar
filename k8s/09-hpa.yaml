##############################################
# HorizontalPodAutoscaler - Cadastro Service
##############################################
# Pre-requisito: metrics-server instalado no cluster
# kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
##############################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cadastro-hpa
  namespace: escola-system
  labels:
    app: cadastro-service
    app.kubernetes.io/part-of: sistema-escolar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cadastro-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---

##############################################
# HorizontalPodAutoscaler - Matricula Service
# (maior escala pois periodos de matricula tem picos)
##############################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: matricula-hpa
  namespace: escola-system
  labels:
    app: matricula-service
    app.kubernetes.io/part-of: sistema-escolar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: matricula-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---

##############################################
# HorizontalPodAutoscaler - Gateway Service
##############################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: escola-system
  labels:
    app: gateway-service
    app.kubernetes.io/part-of: sistema-escolar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
