# Cluster Kubernetes local com kind, simulando 3 maquinas
# Uso: kind create cluster --config k8s/kind-cluster.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: escola
nodes:
  # Node 1 - control-plane + roda pods + recebe trafego do Ingress
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  # Node 2 - worker
  - role: worker
  # Node 3 - worker
  - role: worker
