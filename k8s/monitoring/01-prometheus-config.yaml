##############################################
# ConfigMap - Configuracao do Prometheus
# Define QUAIS endpoints o Prometheus vai coletar (scrape)
##############################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
    app.kubernetes.io/part-of: sistema-escolar
data:
  prometheus.yml: |
    # Configuracao global
    global:
      scrape_interval: 15s        # Coleta metricas a cada 15 segundos
      evaluation_interval: 15s    # Avalia regras de alerta a cada 15s
      scrape_timeout: 10s

    # ==========================================
    # Scrape Configs - Define os alvos de coleta
    # ==========================================
    scrape_configs:

      # 1. Metricas do proprio Prometheus
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # 2. Cadastro Service - /actuator/prometheus
      - job_name: 'cadastro-service'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 10s
        dns_sd_configs:
          - names:
              - 'cadastro-svc.escola-system.svc.cluster.local'
            type: A
            port: 8081
        # Adiciona labels para identificar o servico nos dashboards
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
          - target_label: service
            replacement: cadastro-service
          - target_label: namespace
            replacement: escola-system

      # 3. Disciplina Service - /actuator/prometheus
      - job_name: 'disciplina-service'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 10s
        dns_sd_configs:
          - names:
              - 'disciplina-svc.escola-system.svc.cluster.local'
            type: A
            port: 8083
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
          - target_label: service
            replacement: disciplina-service
          - target_label: namespace
            replacement: escola-system

      # 4. Matricula Service - /actuator/prometheus
      - job_name: 'matricula-service'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 10s
        dns_sd_configs:
          - names:
              - 'matricula-svc.escola-system.svc.cluster.local'
            type: A
            port: 8082
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
          - target_label: service
            replacement: matricula-service
          - target_label: namespace
            replacement: escola-system

      # 5. Gateway Service - /actuator/prometheus
      - job_name: 'gateway-service'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 10s
        dns_sd_configs:
          - names:
              - 'gateway-svc.escola-system.svc.cluster.local'
            type: A
            port: 8080
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
          - target_label: service
            replacement: gateway-service
          - target_label: namespace
            replacement: escola-system

    # ==========================================
    # Regras de Alerta
    # ==========================================
    rule_files:
      - '/etc/prometheus/alert-rules.yml'

  # Regras de alerta para os microsservicos
  alert-rules.yml: |
    groups:
      - name: escola-alerts
        rules:
          # Alerta: servico fora do ar (sem metricas por 1 minuto)
          - alert: ServicoIndisponivel
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Servico {{ $labels.job }} esta fora do ar"
              description: "O servico {{ $labels.job }} nao esta respondendo ha mais de 1 minuto."

          # Alerta: uso alto de memoria na JVM (>80%)
          - alert: MemoriaJVMAlta
            expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "JVM heap alto em {{ $labels.job }}"
              description: "O servico {{ $labels.job }} esta usando mais de 80% do heap ha 5 minutos."

          # Alerta: muitos erros HTTP 5xx (>5% das requisicoes)
          - alert: TaxaErro5xxAlta
            expr: |
              sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
              /
              sum(rate(http_server_requests_seconds_count[5m])) by (job)
              > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Taxa de erro 5xx alta em {{ $labels.job }}"
              description: "Mais de 5% das requisicoes estao retornando erro 5xx."

          # Alerta: Circuit Breaker aberto
          - alert: CircuitBreakerAberto
            expr: resilience4j_circuitbreaker_state{state="open"} == 1
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "Circuit Breaker ABERTO: {{ $labels.name }} em {{ $labels.job }}"
              description: "O circuit breaker {{ $labels.name }} esta no estado OPEN, indicando falhas no servico downstream."

          # Alerta: latencia alta (p95 > 2 segundos)
          - alert: LatenciaAlta
            expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Latencia P95 alta em {{ $labels.job }}"
              description: "O percentil 95 de latencia esta acima de 2 segundos ha 3 minutos."
