##############################################
# PodDisruptionBudget - Garante disponibilidade
# durante manutencao de nos e rollouts
##############################################

# Cadastro Service: sempre pelo menos 1 pod disponivel
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cadastro-pdb
  namespace: escola-system
  labels:
    app: cadastro-service
    app.kubernetes.io/part-of: sistema-escolar
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cadastro-service

---

