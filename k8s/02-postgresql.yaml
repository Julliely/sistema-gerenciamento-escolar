##############################################
# PersistentVolumeClaim - Storage do PostgreSQL
##############################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: escola-system
  labels:
    app: postgresql
    app.kubernetes.io/part-of: sistema-escolar
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---

##############################################
# StatefulSet - PostgreSQL com persistencia
##############################################
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: escola-system
  labels:
    app: postgresql
    app.kubernetes.io/part-of: sistema-escolar
spec:
  serviceName: postgresql-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: escola-config
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Readiness: verifica se o PostgreSQL aceita conexoes
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - escola_db
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          # Liveness: reinicia se o PostgreSQL travar
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - escola_db
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---

##############################################
# Service - Expoe PostgreSQL internamente
##############################################
apiVersion: v1
kind: Service
metadata:
  name: postgresql-svc
  namespace: escola-system
  labels:
    app: postgresql
    app.kubernetes.io/part-of: sistema-escolar
spec:
  type: ClusterIP
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
