##############################################
# Deployment - Disciplina Service
##############################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: disciplina-service
  namespace: escola-system
  labels:
    app: disciplina-service
    app.kubernetes.io/part-of: sistema-escolar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: disciplina-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: disciplina-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: disciplina-service
          image: escola/disciplina-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: escola-config
                  key: POSTGRES_HOST
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: CADASTRO_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: escola-config
                  key: CADASTRO_SERVICE_URL
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20

---

##############################################
# Service - Disciplina Service (ClusterIP)
##############################################
apiVersion: v1
kind: Service
metadata:
  name: disciplina-svc
  namespace: escola-system
  labels:
    app: disciplina-service
    app.kubernetes.io/part-of: sistema-escolar
spec:
  type: ClusterIP
  selector:
    app: disciplina-service
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
      name: http
