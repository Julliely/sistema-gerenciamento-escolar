##############################################
# NetworkPolicy - Seguranca de rede no cluster
##############################################
# Controla qual pod pode se comunicar com qual.
# Principio: least privilege - so permite o necessario.
##############################################

# 1. Default: bloqueia todo trafego de entrada no namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: escola-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---

# 2. Permite Ingress Controller -> Frontend e Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: escola-system
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: escola-system
spec:
  podSelector:
    matchLabels:
      app: gateway-service
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP

---

# 3. Permite Gateway -> Microsservicos (somente o gateway pode chamar os servicos)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-cadastro
  namespace: escola-system
spec:
  podSelector:
    matchLabels:
      app: cadastro-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway-service
        # Tambem permite chamadas inter-servico
        - podSelector:
            matchLabels:
              app: disciplina-service
        - podSelector:
            matchLabels:
              app: matricula-service
      ports:
        - port: 8081
          protocol: TCP

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-disciplina
  namespace: escola-system
spec:
  podSelector:
    matchLabels:
      app: disciplina-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway-service
        - podSelector:
            matchLabels:
              app: matricula-service
      ports:
        - port: 8083
          protocol: TCP

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-matricula
  namespace: escola-system
spec:
  podSelector:
    matchLabels:
      app: matricula-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway-service
      ports:
        - port: 8082
          protocol: TCP

---

# 4. Permite Microsservicos -> PostgreSQL (somente os servicos acessam o banco)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-postgresql
  namespace: escola-system
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cadastro-service
        - podSelector:
            matchLabels:
              app: disciplina-service
        - podSelector:
            matchLabels:
              app: matricula-service
      ports:
        - port: 5432
          protocol: TCP

---

# 5. Permite scraping do Prometheus (metricas) em todos os pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: escola-system
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - cadastro-service
          - disciplina-service
          - matricula-service
          - gateway-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8081
          protocol: TCP
        - port: 8082
          protocol: TCP
        - port: 8083
          protocol: TCP
        - port: 8080
          protocol: TCP
