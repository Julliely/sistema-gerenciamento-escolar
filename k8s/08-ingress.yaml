##############################################
# Ingress - Ponto de entrada unico do sistema
##############################################
# Pre-requisito: instalar Nginx Ingress Controller no cluster
# kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
##############################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: escola-ingress
  namespace: escola-system
  labels:
    app.kubernetes.io/part-of: sistema-escolar
  annotations:
    # Timeouts maiores: a JVM tem warm-up lento na primeira requisicao
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: escola.local
      http:
        paths:
          # Frontend - rota principal
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
          # API Gateway - todas as rotas /api/*
          - path: /cadastro
            pathType: Prefix
            backend:
              service:
                name: gateway-svc
                port:
                  number: 8080
          - path: /disciplina
            pathType: Prefix
            backend:
              service:
                name: gateway-svc
                port:
                  number: 8080
          - path: /matricula
            pathType: Prefix
            backend:
              service:
                name: gateway-svc
                port:
                  number: 8080
