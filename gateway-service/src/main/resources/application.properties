spring.application.name=gateway-service
server.port=8080
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Info do servico
info.app.name=gateway-service
info.app.description=API Gateway - roteamento de requisicoes
info.app.version=1.0.0

# ==========================================
# Resilience4j - Circuit Breaker (Gateway)
# ==========================================
# Circuit breaker para cada servico downstream
resilience4j.circuitbreaker.instances.cadastroRoute.register-health-indicator=true
resilience4j.circuitbreaker.instances.cadastroRoute.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.cadastroRoute.sliding-window-size=10
resilience4j.circuitbreaker.instances.cadastroRoute.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cadastroRoute.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.cadastroRoute.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.cadastroRoute.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.matriculaRoute.register-health-indicator=true
resilience4j.circuitbreaker.instances.matriculaRoute.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.matriculaRoute.sliding-window-size=10
resilience4j.circuitbreaker.instances.matriculaRoute.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.matriculaRoute.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.matriculaRoute.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.matriculaRoute.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.disciplinaRoute.register-health-indicator=true
resilience4j.circuitbreaker.instances.disciplinaRoute.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.disciplinaRoute.sliding-window-size=10
resilience4j.circuitbreaker.instances.disciplinaRoute.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.disciplinaRoute.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.disciplinaRoute.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.disciplinaRoute.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j - Retry (Gateway)
resilience4j.retry.instances.cadastroRoute.max-attempts=3
resilience4j.retry.instances.cadastroRoute.wait-duration=500ms
resilience4j.retry.instances.cadastroRoute.enable-exponential-backoff=true
resilience4j.retry.instances.cadastroRoute.exponential-backoff-multiplier=2

resilience4j.retry.instances.matriculaRoute.max-attempts=3
resilience4j.retry.instances.matriculaRoute.wait-duration=500ms
resilience4j.retry.instances.matriculaRoute.enable-exponential-backoff=true
resilience4j.retry.instances.matriculaRoute.exponential-backoff-multiplier=2

resilience4j.retry.instances.disciplinaRoute.max-attempts=3
resilience4j.retry.instances.disciplinaRoute.wait-duration=500ms
resilience4j.retry.instances.disciplinaRoute.enable-exponential-backoff=true
resilience4j.retry.instances.disciplinaRoute.exponential-backoff-multiplier=2

# Expor metricas do Resilience4j no Actuator
management.health.circuitbreakers.enabled=true
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
